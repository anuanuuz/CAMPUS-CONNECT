version: '3.8'

services:
  # PHP-FPM Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    container_name: alumni_app
    restart: unless-stopped
    tty: true
    environment:
      SERVICE_NAME: app
      SERVICE_TAGS: dev
    working_dir: /var/www
    volumes:
      - ./:/var/www
      - ./docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini
    networks:
      - alumni-network
    depends_on:
      - database
      - redis

  # Nginx Web Server
  webserver:
    image: nginx:alpine
    container_name: alumni_webserver
    restart: unless-stopped
    tty: true
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./:/var/www
      - ./docker/nginx/conf.d/:/etc/nginx/conf.d/
      - ./docker/nginx/ssl/:/etc/nginx/ssl/
    networks:
      - alumni-network
    depends_on:
      - app

  # MySQL Database
  database:
    image: mysql:8.0
    container_name: alumni_database
    restart: unless-stopped
    tty: true
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: alumni_association
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_USER: alumni_user
      MYSQL_PASSWORD: alumni_password
      SERVICE_TAGS: dev
      SERVICE_NAME: mysql
    volumes:
      - alumni_db_data:/var/lib/mysql/
      - ./docker/mysql/my.cnf:/etc/mysql/my.cnf
    networks:
      - alumni-network

  # Redis Cache & Session Store
  redis:
    image: redis:7-alpine
    container_name: alumni_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - alumni_redis_data:/data
    networks:
      - alumni-network
    command: redis-server --appendonly yes --requirepass redis_password

  # Node.js for Frontend Build
  node:
    image: node:18-alpine
    container_name: alumni_node
    working_dir: /var/www
    volumes:
      - ./:/var/www
    command: sh -c "npm install && npm run dev"
    networks:
      - alumni-network

  # Queue Worker
  queue:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    container_name: alumni_queue
    restart: unless-stopped
    command: php artisan queue:work --sleep=3 --tries=3 --max-time=3600
    volumes:
      - ./:/var/www
      - ./docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini
    networks:
      - alumni-network
    depends_on:
      - app
      - database
      - redis

  # Scheduler (Cron)
  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    container_name: alumni_scheduler
    restart: unless-stopped
    command: sh -c 'while true; do php artisan schedule:run; sleep 60; done'
    volumes:
      - ./:/var/www
    networks:
      - alumni-network
    depends_on:
      - app
      - database

  # phpMyAdmin (Development Only)
  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: alumni_phpmyadmin
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      PMA_HOST: database
      PMA_PORT: 3306
      PMA_USER: alumni_user
      PMA_PASSWORD: alumni_password
      MYSQL_ROOT_PASSWORD: root_password
    networks:
      - alumni-network
    depends_on:
      - database
    profiles:
      - development

  # Redis Commander (Development Only)
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: alumni_redis_commander
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      REDIS_HOSTS: local:redis:6379:0:redis_password
    networks:
      - alumni-network
    depends_on:
      - redis
    profiles:
      - development

  # MailHog for Email Testing (Development Only)
  mailhog:
    image: mailhog/mailhog
    container_name: alumni_mailhog
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "8025:8025"
    networks:
      - alumni-network
    profiles:
      - development

  # Elasticsearch (Optional - for advanced search)
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.9.0
    container_name: alumni_elasticsearch
    restart: unless-stopped
    ports:
      - "9200:9200"
      - "9300:9300"
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    volumes:
      - alumni_es_data:/usr/share/elasticsearch/data
    networks:
      - alumni-network
    profiles:
      - search

  # Kibana (Optional - for Elasticsearch visualization)
  kibana:
    image: docker.elastic.co/kibana/kibana:8.9.0
    container_name: alumni_kibana
    restart: unless-stopped
    ports:
      - "5601:5601"
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
    networks:
      - alumni-network
    depends_on:
      - elasticsearch
    profiles:
      - search

# Docker Volumes
volumes:
  alumni_db_data:
    driver: local
  alumni_redis_data:
    driver: local
  alumni_es_data:
    driver: local

# Docker Networks
networks:
  alumni-network:
    driver: bridge

# Production Override
# Use: docker-compose -f docker-compose.yml -f docker-compose.prod.yml up -d
---
# docker-compose.prod.yml (Production Configuration)
version: '3.8'

services:
  app:
    build:
      target: production
    environment:
      APP_ENV: production
      APP_DEBUG: false
    volumes:
      - ./storage:/var/www/storage
      - ./bootstrap/cache:/var/www/bootstrap/cache
    restart: always

  webserver:
    volumes:
      - ./public:/var/www/public:ro
      - ./docker/nginx/prod.conf:/etc/nginx/conf.d/default.conf
      - ssl_certificates:/etc/nginx/ssl
    restart: always

  database:
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - alumni_db_data_prod:/var/lib/mysql/
    restart: always

  redis:
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    restart: always

  queue:
    restart: always
    deploy:
      replicas: 2

  # Remove development services
  phpmyadmin:
    profiles:
      - disabled

  redis-commander:
    profiles:
      - disabled

  mailhog:
    profiles:
      - disabled

volumes:
  alumni_db_data_prod:
    driver: local
  ssl_certificates:
    driver: local